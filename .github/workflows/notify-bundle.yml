name: Notify claude-ecosystem-hygiene of updates

# Triggers the bundle repo's sync workflow when this canonical repo gets a
# push to main. Mirrors the pattern used by wan-huiyan/memory-hygiene so the
# bundle is within seconds of the canonical version instead of waiting for the
# weekly scheduled sync.
#
# Requires a repository secret BUNDLE_SYNC_TOKEN: a PAT with `repo` scope
# that has write access to wan-huiyan/claude-ecosystem-hygiene. If the secret
# is missing, the job is skipped gracefully (the weekly cron sync in the bundle
# still runs as a fallback).

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'wan-huiyan/test-effectiveness-auditor' }}
    steps:
      - name: Check for dispatch token
        id: check
        run: |
          if [ -z "${{ secrets.BUNDLE_SYNC_TOKEN }}" ]; then
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "::notice::BUNDLE_SYNC_TOKEN not set — skipping dispatch (weekly cron in bundle will still sync)"
          else
            echo "has_token=true" >> $GITHUB_OUTPUT
          fi

      - name: Dispatch to bundle repo
        if: steps.check.outputs.has_token == 'true'
        run: |
          curl -sfL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.BUNDLE_SYNC_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/wan-huiyan/claude-ecosystem-hygiene/dispatches \
            -d '{"event_type":"test-effectiveness-auditor-updated","client_payload":{"upstream_sha":"${{ github.sha }}"}}'
          echo "✓ Dispatched sync event to claude-ecosystem-hygiene"
